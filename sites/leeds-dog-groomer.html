<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws & Claws | Professional Dog Grooming Leeds</title>
    <meta name="description" content="Professional dog grooming in Leeds. Bath, trim, nail clip. Full grooming service.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=1920'); background-size: cover; background-position: center; }
        .btn-primary { background: #8B5CF6; transition: all 0.3s ease; }
        .btn-primary:hover { filter: brightness(110%); }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="fixed w-full bg-white/95 shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">🐕 Paws & Claws</h1>
            <a href="#contact" class="btn-primary text-white px-5 py-2 rounded-lg">Book Now</a>
        </div>
    </nav>
    <section class="hero-bg h-screen flex items-center justify-center text-center px-4">
        <div class="max-w-3xl">
            <h2 class="text-4xl md:text-6xl font-bold text-white mb-6">Leeds' Favourite Dog Groomers</h2>
            <p class="text-xl text-gray-200 mb-8">Full grooming, bath & blow dry, nail trimming.</p>
            <a href="#contact" class="btn-primary text-white px-8 py-4 rounded-lg font-semibold text-lg">Book Grooming</a>
        </div>
    </section>
    <section class="py-20 px-4">
        <div class="max-w-6xl mx-auto">
            <h3 class="text-3xl font-bold text-center mb-12">Our Services</h3>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="bg-white p-8 rounded-2xl shadow-sm"><h4 class="text-xl font-semibold mb-3">Full Groom</h4><p class="text-gray-600">From £35</p></div>
                <div class="bg-white p-8 rounded-2xl shadow-sm"><h4 class="text-xl font-semibold mb-3">Breed Trim</h4><p class="text-gray-600">From £45</p></div>
                <div class="bg-white p-8 rounded-2xl shadow-sm"><h4 class="text-xl font-semibold mb-3">Nail & Pamper</h4><p class="text-gray-600">From £15</p></div>
            </div>
        </div>
    </section>
    <section id="contact" class="py-20 px-4">
        <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="md:flex">
                <div class="md:w-1/2 bg-purple-600 p-8 text-white">
                    <h3 class="text-2xl font-bold mb-6">Get In Touch</h3>
                    <p>📍 23 Headingley Lane, Leeds LS6</p>
                    <p>📞 0113 123 4567</p>
                </div>
                <div class="md:w-1/2 p-8">
                    <form class="space-y-4">
                        <input type="text" placeholder="Your Name" class="w-full px-4 py-3 border rounded-lg">
                        <input type="tel" placeholder="Phone" class="w-full px-4 py-3 border rounded-lg">
                        <button class="btn-primary w-full text-white py-3 rounded-lg">Book Now</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
